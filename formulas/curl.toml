# Example formula: curl
# A command-line tool for transferring data with URLs

[package]
name = "curl"
version = "8.19.0"
description = "Command-line tool for transferring data with URLs"
homepage = "https://curl.se"
license = "MIT"

[source]
url = "https://github.com/curl/curl/releases/download/curl-8_19_0/curl-8.19.0.tar.gz"
sha256 = "2a2c11db4c122691aa23b4363befda1bfd801770bfebf41e1d21cee4f2ab0f71"
mirrors = [
    "https://github.com/curl/curl/releases/download/curl-8_18_0/curl-8.19.0.tar.gz"
]

[bottle.macos-arm64]
url = "https://ghcr.io/v2/homebrew/core/curl/blobs/sha256:e51e0fef9c8c8ff821f9af07c5a055801836ead9bc6de1c88d3c9a01e0cb4117"
sha256 = "e51e0fef9c8c8ff821f9af07c5a055801836ead9bc6de1c88d3c9a01e0cb4117"

[bottle.macos-x86_64]
url = "https://ghcr.io/v2/homebrew/core/curl/blobs/sha256:e93bbb5c8a803427c63f9842d42e4d6cda82b51c4d3af345574c15f77541250e"
sha256 = "e93bbb5c8a803427c63f9842d42e4d6cda82b51c4d3af345574c15f77541250e"

[bottle.linux-x86_64]
url = "https://ghcr.io/v2/homebrew/core/curl/blobs/sha256:29ef3f57ed1a8cba8c2689cc8a8ca097908c40d17d4c899e16acfa95ab899b93"
sha256 = "29ef3f57ed1a8cba8c2689cc8a8ca097908c40d17d4c899e16acfa95ab899b93"

[dependencies]
runtime = ["openssl ^3.0", "zlib >=1.2.11", "libssh2"]
build = ["pkg-config", "autoconf", "automake"]

[build]
commands = [
    "./configure --prefix=$PREFIX --with-openssl=$CELLAR/openssl/3.4.4 --with-libssh2=$CELLAR/libssh2/1.11.1 --with-zlib=$CELLAR/zlib/1.3.2 --without-libpsl --without-brotli --without-zstd --without-nghttp2 --without-libidn2 --disable-ldap --disable-ldaps",
    "make -j$NCPU",
    "make install"
]

[build.env]
PKG_CONFIG_PATH = "$CELLAR/openssl/3.4.4/lib/pkgconfig:$CELLAR/libssh2/1.11.1/lib/pkgconfig:$CELLAR/zlib/1.3.2/lib/pkgconfig"
LDFLAGS = "-L$CELLAR/openssl/3.4.4/lib -L$CELLAR/zlib/1.3.2/lib -L$CELLAR/libssh2/1.11.1/lib -Wl,-rpath,$CELLAR/openssl/3.4.4/lib -Wl,-rpath,$CELLAR/zlib/1.3.2/lib -Wl,-rpath,$CELLAR/libssh2/1.11.1/lib"
CPPFLAGS = "-I$CELLAR/openssl/3.4.4/include -I$CELLAR/zlib/1.3.2/include -I$CELLAR/libssh2/1.11.1/include"
