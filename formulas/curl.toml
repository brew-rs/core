# Example formula: curl
# A command-line tool for transferring data with URLs

[package]
name = "curl"
version = "8.20.0"
description = "Command-line tool for transferring data with URLs"
homepage = "https://curl.se"
license = "MIT"

[source]
url = "https://github.com/curl/curl/releases/download/curl-8_20_0/curl-8.20.0.tar.gz"
sha256 = "fc5819cad3f9f5482669adcdc49a782c15f36d2a0715b395b06d9173593d2dc0"
mirrors = [
    "https://github.com/curl/curl/releases/download/curl-8_19_0/curl-8.20.0.tar.gz"
]

[bottle.macos-arm64]
url = "https://github.com/brew-rs/core/releases/download/curl-8.20.0/curl-8.20.0.macos-arm64.bottle.tar.gz"
sha256 = "828f20eee8a1b8ad3230d3d53261c606a1df8e83c32fb40d32ed5e318905b023"

[bottle.macos-x86_64]
url = "https://github.com/brew-rs/core/releases/download/curl-8.20.0/curl-8.20.0.macos-x86_64.bottle.tar.gz"
sha256 = "490d966a8a3839bc5826a0726c6627c09b0f1e08f05f6873135eb25194efdf67"

[bottle.linux-x86_64]
url = "https://github.com/brew-rs/core/releases/download/curl-8.20.0/curl-8.20.0.linux-x86_64.bottle.tar.gz"
sha256 = "fa44b48d5da2aea891be187da2b1f60fffd46062c8b8691c7e89648d1ba59d05"

[dependencies]
runtime = ["openssl ^3.0", "zlib >=1.2.11", "libssh2"]
build = ["pkg-config", "autoconf", "automake"]

[build]
commands = [
    "./configure --prefix=$PREFIX --with-openssl --with-libssh2 --with-zlib --without-libpsl --without-brotli --without-zstd --without-nghttp2 --without-libidn2 --disable-ldap --disable-ldaps",
    "make -j$NCPU",
    "make install"
]
