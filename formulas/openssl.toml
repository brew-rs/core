# Formula: openssl
# Cryptography and SSL/TLS toolkit

[package]
name = "openssl"
version = "3.6.1"
description = "Cryptography and SSL/TLS toolkit"
homepage = "https://openssl-library.org"
license = "Apache-2.0"

[source]
url = "https://github.com/openssl/openssl/releases/download/openssl-3.6.1/openssl-3.6.1.tar.gz"
sha256 = "b1bfedcd5b289ff22aee87c9d600f515767ebf45f77168cb6d64f231f518a82e"
mirrors = [
    "https://www.openssl.org/source/openssl-3.6.1.tar.gz"
]

[dependencies]
runtime = ["zlib"]
build = ["perl", "make"]

[build]
commands = [
    "./Configure --prefix=$PREFIX --openssldir=$PREFIX/etc/openssl --libdir=lib shared zlib --with-zlib-lib=$CELLAR/zlib/1.3.2/lib --with-zlib-include=$CELLAR/zlib/1.3.2/include",
    "make -j$NCPU",
    "make install"
]

[build.env]
KERNEL_BITS = "64"
