# Formula: openssl
# Cryptography and SSL/TLS toolkit

[package]
name = "openssl"
version = "3.6.1"
description = "Cryptography and SSL/TLS toolkit"
homepage = "https://openssl-library.org"
license = "Apache-2.0"

[source]
url = "https://github.com/openssl/openssl/releases/download/openssl-3.6.1/openssl-3.6.1.tar.gz"
sha256 = "b1bfedcd5b289ff22aee87c9d600f515767ebf45f77168cb6d64f231f518a82e"
mirrors = [
    "https://www.openssl.org/source/openssl-3.6.1.tar.gz"
]

[bottle.macos-arm64]
url = "https://ghcr.io/v2/homebrew/core/openssl/3/blobs/sha256:d0f784ea2dce63f778a41cc0db641a95f8c46c39e5487bd151cad20760723b13"
sha256 = "d0f784ea2dce63f778a41cc0db641a95f8c46c39e5487bd151cad20760723b13"

[bottle.macos-x86_64]
url = "https://ghcr.io/v2/homebrew/core/openssl/3/blobs/sha256:9e28f179957b34d64a95c6de7912f0262fb3b42d2c0fb7607aacfa278c42deb8"
sha256 = "9e28f179957b34d64a95c6de7912f0262fb3b42d2c0fb7607aacfa278c42deb8"

[bottle.linux-x86_64]
url = "https://ghcr.io/v2/homebrew/core/openssl/3/blobs/sha256:89ac158da355fc26605808829909a11e23d604f2d70ac7e272f318a71c1eab5c"
sha256 = "89ac158da355fc26605808829909a11e23d604f2d70ac7e272f318a71c1eab5c"

[dependencies]
runtime = ["zlib"]
build = ["perl", "make"]

[build]
commands = [
    "./Configure --prefix=$PREFIX --openssldir=$PREFIX/etc/openssl --libdir=lib shared zlib --with-zlib-lib=$CELLAR/zlib/1.3.2/lib --with-zlib-include=$CELLAR/zlib/1.3.2/include",
    "make -j$NCPU",
    "make install"
]

[build.env]
KERNEL_BITS = "64"
