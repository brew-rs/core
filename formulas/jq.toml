# Example formula: jq
# Lightweight and flexible command-line JSON processor

[package]
name = "jq"
version = "1.8.1"
description = "Lightweight and flexible command-line JSON processor"
homepage = "https://jqlang.github.io/jq/"
license = "MIT"

[source]
url = "https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-1.8.1.tar.gz"
sha256 = "2be64e7129cecb11d5906290eba10af694fb9e3e7f9fc208a311dc33ca837eb0"

[dependencies]
build = ["autoconf", "automake", "libtool"]

[build]
commands = [
    "./configure --prefix=$PREFIX --disable-maintainer-mode --with-oniguruma=builtin",
    "make -j$NCPU",
    "make install"
]
