# Example formula: jq
# Lightweight and flexible command-line JSON processor

[package]
name = "jq"
version = "1.8.1"
description = "Lightweight and flexible command-line JSON processor"
homepage = "https://jqlang.github.io/jq/"
license = "MIT"

[source]
url = "https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-1.8.1.tar.gz"
sha256 = "2be64e7129cecb11d5906290eba10af694fb9e3e7f9fc208a311dc33ca837eb0"

[bottle.macos-arm64]
url = "https://github.com/brew-rs/core/releases/download/jq-1.8.1/jq-1.8.1.macos-arm64.bottle.tar.gz"
sha256 = "d312b7ce87a1e8addaa5452a954afe1154b3db911676d4ad5a72568be00c6f43"

[bottle.macos-x86_64]
url = "https://github.com/brew-rs/core/releases/download/jq-1.8.1/jq-1.8.1.macos-x86_64.bottle.tar.gz"
sha256 = "c0af9a1cb5dd2364ec73abbec1a1224cd3c2fdd728f9c6befeb0356b7f9a72e9"

[bottle.linux-x86_64]
url = "https://github.com/brew-rs/core/releases/download/jq-1.8.1/jq-1.8.1.linux-x86_64.bottle.tar.gz"
sha256 = "d8ed65be25f0dc22d48dd9de456e359c1acb618ea52a2160f1dc291ad87bb660"

[dependencies]
build = ["autoconf", "automake", "libtool"]

[build]
commands = [
    "./configure --prefix=$PREFIX --disable-maintainer-mode --with-oniguruma=builtin",
    "make -j$NCPU",
    "make install"
]
